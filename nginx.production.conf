# Drop this file into /etc/nginx/sites-available/moksh-foundation and symlink it to sites-enabled
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream frontend_app {
    server 127.0.0.1:5173; # Port assumes you are running the frontend standalone. Change this to local statically served files if using React static build!
}

server {
    listen 80;
    server_name yourdomain.org www.yourdomain.org;

    # Rate limiting zone mapping (assumes limit_req_zone is defined in nginx.conf http block)
    # limit_req zone=mylimit burst=20 nodelay;

    # GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Backend API routing
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Static Frontend File Routing (Assuming standard React Build drop directly on host machine)
    # location / {
    #     root /var/www/moksh-foundation/frontend/dist;
    #     try_files $uri $uri/ /index.html;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Frontend Proxy Routing (Use this if proxying Next.js or Vite dev server instead of static files)
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
